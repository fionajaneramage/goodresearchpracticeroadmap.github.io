  const tooltip = document.getElementById("roadmap-tooltip");

  Object.keys(stops).forEach(id => {
    const el = document.getElementById(id);
    if (!el) return;

    el.classList.add("roadmap-stop");

    el.addEventListener("mouseenter", (e) => {
      const data = stops[id];
      tooltip.innerHTML = `<strong>${data.title}</strong><p>${data.description}</p>`;
      tooltip.style.display = "block";
    });

    el.addEventListener("mousemove", (e) => {
      tooltip.style.left = (e.pageX + 12) + "px";
      tooltip.style.top = (e.pageY + 12) + "px";
    });

    el.addEventListener("mouseleave", () => {
      tooltip.style.display = "none";
    });

    el.addEventListener("click", () => {
      window.location.href = stops[id].link;
    });
  });
